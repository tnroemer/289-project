name: Build and deploy MyST site

# Builds the MyST website (landing page + the two executed notebooks) and
# publishes it to GitHub Pages. Notebooks run in SAMPLE mode on the synthetic
# dataset, so no credentials or GPU are needed in CI.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: myst-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic sample dataset
        run: PYTHONPATH=src python -m data_setup.make_sample_data

      - name: Install MyST
        run: npm install -g mystmd

      - name: Build site (executes notebooks)
        run: myst build --html --execute

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
